services:
  postgres:
    image: postgres:16-alpine
    container_name: shiplocal-postgres
    restart: unless-stopped
    ports:
      - "5433:5432" # 5433 on host avoids conflict with local Postgres on 5432
    environment:
      POSTGRES_USER: shiplocal
      POSTGRES_PASSWORD: shiplocal
      POSTGRES_DB: shiplocal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiplocal -d shiplocal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shiplocal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
